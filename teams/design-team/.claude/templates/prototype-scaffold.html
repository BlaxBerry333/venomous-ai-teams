<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{页面名} — {项目名} 原型</title>

  <!--
    ═══════════════════════════════════════════════════════════════════════
    单一真相源：design-tokens.css 是整个任务的唯一 token 来源。
    本文件默认通过下面这行 link 引用外部 tokens（多文件 prototype 推荐，避免二重管理）。
    快速轻量原型也可以把 tokens 内联到下面的 style 标签中（不是错误，根据场景选择）。
    浏览器双击 HTML 打开（file:// 协议）仍能加载同目录 CSS（各主流浏览器默认支持）。
    若遇到少数严格 file:// CORS 限制，可用 `python -m http.server` 或类似本地服务器打开。
    ═══════════════════════════════════════════════════════════════════════
  -->
  <link rel="stylesheet" href="design-tokens.css">

  <style>
    /* ========== Reset ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-family-sans);
      font-size: var(--text-body-size);
      line-height: var(--text-body-line);
      color: var(--on-surface-default);
      background: var(--surface-default);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img, svg { max-width: 100%; display: block; }
    a {
      color: var(--color-primary);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
    }
    a:hover { color: var(--color-primary-hover); text-decoration: underline; }
    a:focus-visible {
      outline: var(--focus-ring);
      outline-offset: var(--focus-ring-offset);
      border-radius: var(--radius-xs);
    }
    button {
      cursor: pointer;
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
    }
    button:focus-visible {
      outline: var(--focus-ring);
      outline-offset: var(--focus-ring-offset);
    }

    /* ========== Utilities ========== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-4);
    }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }

    /* ========== Typography 示例（成对用法，删除用不到的） ========== */
    h1 {
      font-size: var(--text-heading-xl-size);
      line-height: var(--text-heading-xl-line);
      letter-spacing: var(--text-heading-xl-tracking);
      font-weight: var(--font-weight-bold);
    }
    h2 {
      font-size: var(--text-heading-lg-size);
      line-height: var(--text-heading-lg-line);
      letter-spacing: var(--text-heading-lg-tracking);
      font-weight: var(--font-weight-semibold);
    }
    h3 {
      font-size: var(--text-heading-size);
      line-height: var(--text-heading-line);
      letter-spacing: var(--text-heading-tracking);
      font-weight: var(--font-weight-semibold);
    }
    h4 {
      font-size: var(--text-heading-sm-size);
      line-height: var(--text-heading-sm-line);
      letter-spacing: var(--text-heading-sm-tracking);
      font-weight: var(--font-weight-semibold);
    }

    /* ========== Components ========== */
    /* 在此添加组件样式。所有视觉值必须用 var(--*)；禁止硬编码 hex / 字号 / 间距。
       组件代码只用 semantic 层（--color-primary / --surface-* / --on-surface-*），
       不要直接用 primitive 层（--blue-9 / --gray-3）。 */

    /* ========== Page-specific ========== */
    /* 页面特定样式写这里 */

    /* ========== Responsive ========== */
    @media (max-width: 1024px) {
      /* lg breakpoint */
    }
    @media (max-width: 768px) {
      /* md breakpoint */
    }
    @media (max-width: 640px) {
      /* sm breakpoint */
    }
  </style>
</head>
<body>

  <header role="banner">
    <nav aria-label="主导航">
      <div class="container">
        <!-- 导航内容（用真实业务文案，禁止占位 dummy 文本） -->
      </div>
    </nav>
  </header>

  <main role="main">
    <div class="container">
      <!-- 页面主体内容 -->
    </div>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <!-- 页脚内容 -->
    </div>
  </footer>

  <!-- jQuery（仅在需要交互时取消注释） -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js"></script> -->
  <script>
    // $(function() {

    // });
  </script>

</body>
</html>
